apiVersion: v1
kind: Namespace
metadata:
  name: llm-playground
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: llm-policy-monitor-config
  namespace: llm-playground
data:
  LIMITADOR_BASE_URL: "http://limitador-limitador.kuadrant-system.svc.cluster.local:8080"
  LIMITADOR_COUNTER_PATH: "llm%2Fmaas-route"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-policy-monitor
  namespace: llm-playground
  labels:
    app: llm-policy-monitor
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: llm-policy-monitor
  template:
    metadata:
      labels:
        app: llm-policy-monitor
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: llm-policy-monitor
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
      - name: llm-policy-monitor
        image: llm-policy-monitor:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        envFrom:
        - configMapRef:
            name: llm-policy-monitor-config
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 2
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - llm-policy-monitor
              topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: Service
metadata:
  name: llm-policy-monitor
  namespace: llm-playground
  labels:
    app: llm-policy-monitor
spec:
  type: ClusterIP
  selector:
    app: llm-policy-monitor
  ports:
  - name: http
    port: 8080
    targetPort: http
    protocol: TCP
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: llm-policy-monitor
  namespace: llm-playground
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: llm-policy-monitor
  namespace: llm-playground
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
  resourceNames: ["llm-policy-monitor-config"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: llm-policy-monitor
  namespace: llm-playground
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: llm-policy-monitor
subjects:
- kind: ServiceAccount
  name: llm-policy-monitor
  namespace: llm-playground
