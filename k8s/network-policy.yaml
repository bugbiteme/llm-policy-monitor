apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: llm-policy-monitor
  namespace: llm-playground
spec:
  podSelector:
    matchLabels:
      app: llm-policy-monitor
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: llm-playground
    ports:
    - protocol: TCP
      port: 8080
  egress:
  # Allow DNS
  - to:
    - namespaceSelector: {}
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53
  # Allow egress to Limitador service in kuadrant-system
  - to:
    - namespaceSelector:
        matchLabels:
          name: kuadrant-system
    ports:
    - protocol: TCP
      port: 8080
  # Allow egress to any destination for external services
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 80
    - protocol: TCP
      port: 443
